apiVersion: apps/v1
kind: Deployment
metadata:
  name: ventas-frontend
  namespace: innovatech-chile
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ventas-frontend
  template:
    metadata:
      labels:
        app: ventas-frontend
      annotations:
        instrumentation.opentelemetry.io/inject-java: "false"
        instrumentation.opentelemetry.io/inject-nodejs: "false"
        instrumentation.opentelemetry.io/inject-python: "false"
        instrumentation.opentelemetry.io/inject-dotnet: "false"
    spec:
      containers:
        - name: frontend
          image: 761697405485.dkr.ecr.us-east-1.amazonaws.com/ventas-frontend:eks-v1 # Colocar uri de tu imagen en ECR
          ports:
            - containerPort: 80

          # Se agrega Resource para que Metrics Server calcule el % de CPU y Memoria para escalar 
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"

          # HEALTH CHECKS
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

